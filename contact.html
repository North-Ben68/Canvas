<!DOCTYPE html>
<html lang="fr">
<head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="style.css"> 
        <title>Les-création-de-Ben</title>
        <meta charset='utf-8'>
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
<body>
    <section class="top-page">
        <header class="header">
             <img src="logo.png" alt="logo du site">
             <nav class="nav1">
                <li><a href="index.html"> Accueil</a></li>
                <li><a href="real.html"> réalisations numériques</a></li>
                <li><a href="contact.html">contact</a></li>
            </nav>
    </header>
    <main class="contact-container">
        <h2>Me contacter</h2>
        <p class="contact-intro">Un projet en tête ? Une question sur une œuvre ? N'hésitez pas à m'envoyer un message.</p>

        <section class="contact-flex">
            <form class="contact-form">
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Votre projet..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Envoyer le message</button>
            </form>

            <div class="contact-info">
                <h3>Retrouvez-moi sur</h3>
                <div class="social-links">
                    <a href="https://www.instagram.com/_northben_/"><i class="fab fa-instagram"></i> Instagram</a>
                    <a href="#"><i class="fas fa-envelope"></i> hejda@outlook.fr</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <a href="index.html" class="btn-back">Retour à l'accueil</a>
        <p>&copy; 2026 Les Créations de Ben</p>
    </footer>

</body>
</html>
